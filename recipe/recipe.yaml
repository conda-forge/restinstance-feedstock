# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.8.0"
  python_min: "3.11"
  python_check_max: "3.14"

package:
  name: restinstance
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/R/RESTinstance/restinstance-${{ version }}.tar.gz
  sha256: a9dd7e58699e6aa972da20ccc2c5feca95327d53b78c4199408a0cf78fe5bd61

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - docutils
    - flex-swagger
    - genson
    - jsonpath-ng >=1.8.0,<1.9.0
    - jsonschema
    - openapi-core >=0.23.0
    - pygments
    - python >=${{ python_min }}
    - pytz
    - pyyaml
    - requests
    - robotframework
    - setuptools <80
    - tzlocal

tests:
  - python:
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
      imports: REST

about:
  summary: Robot Framework library for RESTful JSON APIs
  license_file: LICENSE.txt
  license: LGPL-3.0-or-later
  homepage: https://pypi.org/project/restinstance
  repository: https://github.com/asyrjasalo/RESTinstance
  documentation: https://asyrjasalo.github.io/RESTinstance

extra:
  recipe-maintainers:
    - abloemert
    - bollwyvl
